name: Daily Wealth OS Snapshot

on:
  schedule:
    - cron: "55 22 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Capture portfolio snapshot
        env:
          ADMIN_DASHBOARD_TOKEN: ${{ secrets.ADMIN_DASHBOARD_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request
          import urllib.error

          base_url = "https://wealth-os-backend-kheh.onrender.com/api/portfolio-snapshots/capture"

          token = os.environ.get("ADMIN_DASHBOARD_TOKEN", "").strip()

          if not token:
              print("ADMIN_DASHBOARD_TOKEN is missing")
              sys.exit(1)

          params = urllib.parse.urlencode({
              "user_id": 1,
              "admin_token": token
          })

          url = base_url + "?" + params

          request = urllib.request.Request(
              url,
              data=b"",
              method="POST"
          )

          try:
              with urllib.request.urlopen(request, timeout=60) as response:
                  body = response.read().decode("utf-8")
                  print("HTTP status:", response.status)
                  print("Response:")
                  print(body)

                  if response.status >= 400:
                      sys.exit(1)

          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", errors="replace")
              print("HTTP status:", error.code)
              print("Response:")
              print(body)
              sys.exit(1)

          except Exception as error:
              print("Snapshot request failed:", repr(error))
              sys.exit(1)
          PY
