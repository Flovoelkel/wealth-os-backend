name: Daily Wealth OS Snapshot

on:
  schedule:
    - cron: "55 22 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Capture portfolio snapshot
        run: |
          curl -i \
            -X POST "https://wealth-os-backend-kheh.onrender.com/api/portfolio-snapshots/capture" \
            -H "Content-Type: application/json" \
            -H "x-admin-token: ${ADMIN_DASHBOARD_TOKEN}" \
            -d '{"user_id":1}'
                env:
          ADMIN_DASHBOARD_TOKEN: ${{ secrets.ADMIN_DASHBOARD_TOKEN }}
