name: Refresh Wealth OS Prices

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  refresh-finnhub:
    runs-on: ubuntu-latest

    steps:
      - name: Refresh Finnhub price cache
        run: |
          curl --fail --silent --show-error "$REFRESH_FINNHUB_URL"
        env:
          REFRESH_FINNHUB_URL: ${{ secrets.REFRESH_FINNHUB_URL }}

  refresh-coingecko:
    runs-on: ubuntu-latest

    steps:
      - name: Refresh CoinGecko price cache
        run: |
          curl --fail --silent --show-error "$REFRESH_COINGECKO_URL"
        env:
          REFRESH_COINGECKO_URL: ${{ secrets.REFRESH_COINGECKO_URL }}
